      - Service Requests
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://clhsaas.cleanharbors.com/
    properties:
      - url: https://clhsaas.cleanharbors.com/
        type: Portal
    description: >-
      Authenticated web portal for Clean Harbors customers to submit
      service requests, view manifests and shipments, retrieve invoices
      and reports, and manage account profile information.
  - aid: clean-harbors:e-manifest
    name: EPA e-Manifest Integration
    tags:
      - EPA
      - e-Manifest
      - RCRA
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.epa.gov/e-manifest
    properties:
      - url: https://www.epa.gov/e-manifest
        type: Documentation
    description: >-
      Clean Harbors interoperates with the federal EPA e-Manifest system
      for electronic creation, signing, and tracking of hazardous-waste
      manifests under RCRA, which exposes its own public APIs at
      manifest.epa.gov.
