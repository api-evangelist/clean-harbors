description: >-
  Clean Harbors is the largest provider of environmental and industrial
  services in North America, delivering hazardous and non-hazardous
  waste management, emergency response, industrial cleaning,
  environmental remediation, and used-oil and solvent recycling through
  its Safety-Kleen subsidiary. Clean Harbors does not publish a public
  developer portal or general-purpose REST API surface; programmatic
  interfaces are limited to the authenticated customer portal at
  clhsaas.cleanharbors.com (CLH SaaS) for service requests, manifests,
  and reporting, and partner-mediated EDI feeds. Customers also use the
  EPA e-Manifest system for federally regulated hazardous-waste
  manifest tracking.
apis: []
artifacts:
